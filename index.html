<!-- Service Worker para funcionar offline -->
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load', function(){
    const swCode = `
      const CACHE = 'painel-bruna-v2';
      self.addEventListener('install', e => {
        e.waitUntil(caches.open(CACHE).then(c => c.addAll(['./'])));
        self.skipWaiting();
      });
      self.addEventListener('activate', e => {
        e.waitUntil(caches.keys().then(keys =>
          Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))
        ));
        self.clients.claim();
      });
      self.addEventListener('fetch', e => {
        e.respondWith(
          caches.match(e.request).then(cached => cached || fetch(e.request).then(res => {
            const clone = res.clone();
            caches.open(CACHE).then(c => c.put(e.request, clone));
            return res;
          }).catch(() => cached))
        );
      });
    `;
    const blob = new Blob([swCode], {type:'application/javascript'});
    const url = URL.createObjectURL(blob);
    navigator.serviceWorker.register(url).catch(()=>{});
  });
}
</script>

<style>
/* ===== RESET & BASE ===== */
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --nav-bg:#1a1410;
  --nav-border:#2e2416;
  --tab-active:#c9a87c;
  --tab-text:#8c7a6a;
  --page-bg:#faf6f1;
}
body{
  background:var(--page-bg);
  font-family:'DM Sans',sans-serif;
  min-height:100vh;
  padding-bottom:80px;
}

/* ===== BOTTOM NAV ===== */
.bottom-nav{
  position:fixed;
  bottom:0;left:0;right:0;
  background:var(--nav-bg);
  border-top:1px solid var(--nav-border);
  display:flex;
  z-index:100;
  padding-bottom:env(safe-area-inset-bottom,0px);
}
.nav-btn{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:4px;
  padding:10px 4px 12px;
  background:none;
  border:none;
  cursor:pointer;
  transition:all 0.2s;
}
.nav-icon{font-size:20px;line-height:1;}
.nav-label{
  font-family:'DM Sans',sans-serif;
  font-size:9px;
  font-weight:500;
  letter-spacing:0.12em;
  text-transform:uppercase;
  color:var(--tab-text);
  transition:color 0.2s;
}
.nav-btn.active .nav-label{color:var(--tab-active);}
.nav-btn.active .nav-icon{filter:drop-shadow(0 0 6px rgba(201,168,124,0.5));}

/* ===== PAGES ===== */
.page{display:none;}
.page.active{display:block;}

/* ===== PAGE HEADER SHARED ===== */
.page-header-bar{
  text-align:center;
  padding:28px 16px 20px;
  border-bottom:1px solid #ede5df;
  margin-bottom:0;
}
.page-header-bar h2{
  font-family:'Cormorant Garamond',serif;
  font-size:1.7rem;
  font-weight:300;
  color:#3d2b24;
  letter-spacing:0.03em;
}
.page-header-bar p{
  font-size:0.72rem;
  color:#8c6e65;
  margin-top:4px;
  letter-spacing:0.12em;
  text-transform:uppercase;
}

/* ===========================
   PAGE 1 — MEDICAMENTOS (dark)
   =========================== */
#page-med{
  background:#0f0e17;
  min-height:100vh;
  padding-bottom:80px;
  background-image:radial-gradient(ellipse at 20% 10%,rgba(180,142,244,.08) 0%,transparent 50%),radial-gradient(ellipse at 80% 80%,rgba(126,216,200,.06) 0%,transparent 50%);
}
/* all med styles from original, namespaced via #page-med */
#page-med .med-inner{color:#e8e4f7;}
#page-med header{text-align:center;margin-bottom:32px;padding-top:28px;}
#page-med header h1{font-family:'DM Serif Display',serif;font-size:1.8rem;color:#e8e4f7;letter-spacing:-.02em;line-height:1.2;}
#page-med header h1 em{font-style:italic;color:#b48ef4;}
#page-med header p{font-size:.8rem;color:#8b85a8;margin-top:6px;font-weight:300;letter-spacing:.05em;text-transform:uppercase;}
.med-legend{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-bottom:28px;padding:0 16px;}
.med-legend-item{display:flex;align-items:center;gap:6px;font-size:.72rem;color:#8b85a8;font-weight:500;letter-spacing:.03em;}
.med-legend-dot{width:10px;height:10px;border-radius:50%;}
.med-phase{background:#1a1929;border:1px solid #2e2a45;border-radius:16px;margin-bottom:16px;overflow:hidden;transition:border-color .2s;}
.med-phase.active{border-color:#b48ef4;box-shadow:0 0 0 1px rgba(180,142,244,.2),0 4px 24px rgba(180,142,244,.08);}
.med-phase-header{padding:16px 20px 12px;display:flex;align-items:flex-start;justify-content:space-between;gap:12px;cursor:pointer;user-select:none;}
.med-phase-header-left{flex:1;}
.med-phase-tag{font-size:.65rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:#b48ef4;margin-bottom:4px;}
.med-phase-title{font-family:'DM Serif Display',serif;font-size:1.1rem;color:#e8e4f7;line-height:1.3;}

.med-day-weekday{font-size:.55rem;color:#8b85a8;text-transform:uppercase;letter-spacing:.05em;}
.med-day-check{font-size:.85rem;line-height:1;}

.med-summary-stat .lbl{font-size:.65rem;color:#8b85a8;text-transform:uppercase;letter-spacing:.07em;margin-top:2px;font-weight:500;}
.med-summary-divider{width:1px;height:32px;background:#2e2a45;}

.dor-summary-card{background:#f8f5f0;border:1px solid #ddd8d0;border-radius:2px;padding:.8rem 1rem;}

.dor-section-title{font-family:'DM Mono',monospace;font-size:.65rem;text-transform:uppercase;letter-spacing:.1em;color:#888;margin-bottom:.6rem;padding-bottom:.4rem;border-bottom:1px solid #ddd8d0;}
.dor-meds-grid{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;margin-bottom:1.5rem;}
.dor-med-item{display:flex;align-items:center;gap:.6rem;padding:.5rem .7rem;border:1px solid #ddd8d0;border-radius:2px;font-size:.82rem;}
.dor-med-check{width:15px;height:15px;accent-color:#1a3a5c;flex-shrink:0;}
.dor-table-wrap{overflow-x:auto;margin-bottom:1.5rem;}

.dor-int-wrap{display:flex;gap:3px;align-items:center;}
.dor-int-btn{width:22px;height:22px;border-radius:50%;border:1.5px solid #ddd8d0;background:white;cursor:pointer;font-family:'DM Mono',monospace;font-size:.6rem;font-weight:500;color:#888;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;}
.dor-int-btn.active-1{background:#27ae60;border-color:#27ae60;color:white;}
.dor-int-btn.active-2{background:#6abf69;border-color:#6abf69;color:white;}
.dor-int-btn.active-3{background:#f1c40f;border-color:#f1c40f;color:#333;}
.dor-int-btn.active-4{background:#f39c12;border-color:#f39c12;color:white;}
.dor-int-btn.active-5{background:#e67e22;border-color:#e67e22;color:white;}
.dor-int-btn.active-6{background:#e74c3c;border-color:#e74c3c;color:white;}
.dor-int-btn.active-7{background:#c0392b;border-color:#c0392b;color:white;}
.dor-int-btn.active-8{background:#922b21;border-color:#922b21;color:white;}
.dor-int-btn.active-9{background:#6e1010;border-color:#6e1010;color:white;}
.dor-int-btn.active-10{background:#2d0000;border-color:#2d0000;color:white;}
.dor-notes-area{width:100%;border:1px solid #ddd8d0;border-radius:2px;background:#f8f5f0;font-family:'DM Sans',sans-serif;font-size:.85rem;color:#2c2c2c;padding:.8rem 1rem;resize:vertical;min-height:70px;line-height:1.6;}

.dor-print-btn{display:block;width:100%;padding:.9rem;background:#1a3a5c;color:white;border:none;font-family:'DM Mono',monospace;font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;transition:background .2s;margin-top:1.5rem;}

   PAGE 3 — SKINCARE
   =========================== */
#page-skin{background:#faf6f1;min-height:100vh;padding-bottom:80px;}
#page-skin .skin-inner{max-width:520px;margin:0 auto;padding:24px 16px 0;}
.skin-tabs{display:flex;gap:8px;justify-content:center;margin-bottom:28px;}
.skin-tab{padding:10px 28px;border-radius:100px;border:1.5px solid #e8c4b8;background:transparent;font-family:'DM Sans',sans-serif;font-size:.82rem;letter-spacing:.1em;text-transform:uppercase;color:#8c6e65;cursor:pointer;transition:all .25s;}
.skin-tab.active{background:#c4826a;border-color:#c4826a;color:white;}
.skin-panel{display:none;}
.skin-panel.active{display:block;}
.skin-section-label{font-size:.68rem;letter-spacing:.18em;text-transform:uppercase;color:#8c6e65;margin-bottom:12px;padding-left:4px;}
.skin-steps-group{margin-bottom:28px;}
.skin-step{display:flex;align-items:flex-start;gap:14px;background:white;border-radius:14px;padding:16px 18px;margin-bottom:10px;border:1px solid #ede5df;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;}
.skin-step::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:#e8c4b8;border-radius:3px 0 0 3px;transition:background .2s;}
.skin-step.done{background:#f2e8e3;}
.skin-step.done::before{background:#c4826a;}
.skin-step-num{width:26px;height:26px;border-radius:50%;border:1.5px solid #e8c4b8;display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:500;color:#8c6e65;flex-shrink:0;transition:all .2s;}
.skin-step.done .skin-step-num{background:#c4826a;border-color:#c4826a;color:white;}
.skin-step-content{flex:1;}
.skin-step-name{font-size:.88rem;font-weight:500;color:#3d2b24;margin-bottom:3px;}
.skin-step-detail{font-size:.74rem;color:#8c6e65;line-height:1.5;}
.skin-step-tag{font-size:.65rem;padding:2px 8px;border-radius:100px;background:#e8c4b8;color:#3d2b24;letter-spacing:.06em;margin-top:6px;display:inline-block;}
.skin-step-tag.manipulado{background:#d4e8d4;color:#2a4a2a;}
.skin-step-tag.opcional{background:#e8eff8;color:#1a2a4a;}
.skin-step-tag.serum{background:#e8d4f0;color:#3a1a4a;}
.skin-night-card{background:#2d1e17;border-radius:20px;padding:20px;margin-bottom:16px;border:1px solid #3d2b24;}
.skin-night-card .skin-section-label{color:#c9a87c;}
.skin-night-card .skin-step{background:rgba(255,255,255,.04);border-color:rgba(255,255,255,.08);}
.skin-night-card .skin-step.done{background:rgba(196,130,106,.15);}
.skin-night-card .skin-step::before{background:rgba(201,168,124,.3);}
.skin-night-card .skin-step.done::before{background:#c9a87c;}
.skin-night-card .skin-step-name{color:#f5ede8;}
.skin-night-card .skin-step-detail{color:#8c7a72;}
.skin-night-card .skin-step-num{border-color:#5a3a2a;color:#c9a87c;}
.skin-night-card .skin-step.done .skin-step-num{background:#c9a87c;border-color:#c9a87c;color:#1e1410;}
.skin-progress-bar{height:4px;background:#ede5df;border-radius:4px;margin-bottom:28px;overflow:hidden;}
.skin-progress-fill{height:100%;background:linear-gradient(90deg,#e8c4b8,#c4826a);border-radius:4px;transition:width .4s ease;width:0%;}
.skin-night-card .skin-progress-bar{background:#3d2b24;}
.skin-night-card .skin-progress-fill{background:linear-gradient(90deg,#5a3a2a,#c9a87c);}
.skin-reset-btn{display:block;margin:16px auto 0;padding:10px 32px;border-radius:100px;border:1.5px solid #e8c4b8;background:transparent;font-family:'DM Sans',sans-serif;font-size:.75rem;letter-spacing:.1em;text-transform:uppercase;color:#8c6e65;cursor:pointer;transition:all .2s;}
.skin-reset-btn:hover{border-color:#c4826a;color:#c4826a;}
.skin-obs-box{background:#fff8f0;border:1px solid #e8c4b8;border-radius:12px;padding:14px 16px;font-size:.76rem;color:#8c6e65;line-height:1.6;margin-bottom:16px;}

.skin-sub-note{font-size:.7rem;color:#8c7a72;margin-bottom:14px;line-height:1.5;}

.ho-table{width:100%;border-collapse:collapse;background:white;border-radius:18px;overflow:hidden;box-shadow:0 2px 12px rgba(29,58,63,.07);font-size:12px;}
.ho-table th{background:#1d3a3f;color:#eaf4f3;font-weight:500;text-transform:uppercase;font-size:9.5px;letter-spacing:.04em;padding:10px 6px;text-align:center;}
.ho-table th:first-child{text-align:left;padding-left:12px;}
.ho-table td{padding:9px 6px;text-align:center;border-bottom:1px solid #eef3f2;color:#1d3a3f;}
.ho-table td:first-child{text-align:left;padding-left:12px;font-weight:600;}
.ho-table tr:last-child td{border-bottom:none;}
.ho-table .ho-table-value{color:#3e8e82;font-weight:600;}
.ho-table .ho-table-value-brl{color:#5c7470;}

/* ===== CARD DIÁRIO ===== */
.daily-card{
  background:linear-gradient(135deg,#1e1628 0%,#231e35 100%);
  border:1px solid #3a3060;
  border-radius:18px;
  padding:18px 18px 14px;
  margin-bottom:20px;
  position:relative;
  overflow:hidden;
}
.daily-card::before{
  content:'';
  position:absolute;
  top:-30px;right:-30px;
  width:100px;height:100px;
  border-radius:50%;
  background:radial-gradient(circle,rgba(180,142,244,.12),transparent 70%);
}
.daily-card-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:14px;
}
.daily-card-title{
  font-family:'DM Serif Display',serif;
  font-size:.95rem;
  color:#e8e4f7;
  letter-spacing:.01em;
}
.daily-card-date{
  font-size:.65rem;
  color:#6b6490;
  font-family:'DM Mono',monospace;
  letter-spacing:.08em;
  text-transform:uppercase;
}
.daily-med-row{
  display:flex;
  align-items:center;
  gap:13px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.07);
  border-radius:12px;
  padding:13px 14px;
  margin-bottom:8px;
  cursor:pointer;
  transition:all .2s;
  user-select:none;
  -webkit-tap-highlight-color:transparent;
}
.daily-med-row:last-child{margin-bottom:0;}
.daily-med-row:hover{background:rgba(255,255,255,.07);}
.daily-med-row.taken{
  background:rgba(76,175,138,.12);
  border-color:rgba(76,175,138,.3);
}
.daily-med-check{
  width:30px;height:30px;
  border-radius:50%;
  border:2px solid #4a4270;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
  font-size:14px;
  transition:all .25s;
  color:transparent;
}
.daily-med-row.taken .daily-med-check{
  background:#4caf8a;
  border-color:#4caf8a;
  color:white;
}
.daily-med-info{flex:1;}
.daily-med-name{
  font-size:.88rem;
  font-weight:500;
  color:#e8e4f7;
  margin-bottom:2px;
  transition:color .2s;
}
.daily-med-row.taken .daily-med-name{
  color:#8b85a8;
  text-decoration:line-through;
}
.daily-med-when{
  font-size:.7rem;
  color:#6b6490;
  display:flex;
  align-items:center;
  gap:5px;
}
.daily-med-dot{
  width:6px;height:6px;
  border-radius:50%;
  flex-shrink:0;
}
.daily-med-dose{
  font-size:.68rem;
  font-weight:600;
  padding:2px 9px;
  border-radius:20px;
  margin-left:auto;
  flex-shrink:0;
}
.daily-reset{
  display:block;
  width:100%;
  margin-top:12px;
  padding:7px;
  background:transparent;
  border:1px solid #2e2a45;
  border-radius:8px;
  color:#4a4270;
  font-family:'DM Sans',sans-serif;
  font-size:.68rem;
  letter-spacing:.08em;
  text-transform:uppercase;
  cursor:pointer;
  transition:all .2s;
}
.daily-reset:hover{border-color:#b48ef4;color:#b48ef4;}
.daily-all-done{
  text-align:center;
  font-size:.75rem;
  color:#4caf8a;
  margin-top:10px;
  font-weight:500;
  letter-spacing:.05em;
  opacity:0;
  transition:opacity .4s;
}
.daily-all-done.visible{opacity:1;}

@media print{
  .bottom-nav{display:none!important;}
  body{padding-bottom:0!important;}
  #page-dor{display:block!important;}
}

const __APP_ID = "painelBruna";
const __KEY_PREFIXES = ["daily_meds_", "desven_days_", "med_control_", "painel_dores_", "painel_skincare_", "home_office_horas_", "home_office_dolar_", "home_office_bonus_", "bokashi_"];

function __keyMatches(k){
  return __KEY_PREFIXES.some(p => k === p || k.indexOf(p) === 0);
}
function __collectLocalSnapshot(){
  const snap = {};
  for(let i=0;i<localStorage.length;i++){
    const k = localStorage.key(i);
    if(__keyMatches(k)) snap[k] = localStorage.getItem(k);
  }
  return snap;
}
let __currentUser = null;
let __pushTimer = null;
function __schedulePush(){
  clearTimeout(__pushTimer);
  __pushTimer = setTimeout(__pushNow, 900);
}
async function __pushNow(){
  if(!__currentUser) return;
  try{
    await __db.collection('users').doc(__currentUser.uid).collection('apps').doc(__APP_ID).set(__collectLocalSnapshot(), {merge:true});
  }catch(e){ console.warn('sync push failed', e); }
}
const __origSetItem = Storage.prototype.setItem.bind(localStorage);
const __origRemoveItem = Storage.prototype.removeItem.bind(localStorage);
localStorage.setItem = function(k,v){ __origSetItem(k,v); if(__keyMatches(k)) __schedulePush(); };
localStorage.removeItem = function(k){ __origRemoveItem(k); if(__keyMatches(k)) __schedulePush(); };

async function __hydrateFromCloud(){
  try{
    const doc = await __db.collection('users').doc(__currentUser.uid).collection('apps').doc(__APP_ID).get();
    if(doc.exists){
      const data = doc.data();
      Object.keys(data).forEach(k=>{ __origSetItem(k, data[k]); });
    }
  }catch(e){ console.warn('sync hydrate failed', e); }
}

function __bootApp(){
  const tpl = document.getElementById('__appTemplate');
  const frag = tpl.content.cloneNode(true);
  const scripts = Array.from(frag.querySelectorAll('script'));
  scripts.forEach(s=>s.remove());
  document.body.appendChild(frag);
  scripts.forEach(old=>{
    const s = document.createElement('script');
    if(old.src){ s.src = old.src; } else { s.textContent = old.textContent; }
    document.body.appendChild(s);
  });
}

(function(){
  const DAILY_KEY = 'daily_meds_v1';
  const WEEKDAYS = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
  const MONTHS = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];

  function todayKey(){
    const d=new Date();
    return `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
  }

  // Desvenlafaxina: fase 1 = 01–04/06, fase 2 = 05/06+
  function desvenPhase(){
    const now=new Date();
    const y=now.getFullYear(), m=now.getMonth(), d=now.getDate();
    if(y===2026 && m===5 && d>=1 && d<=4) return 1;
    if((y===2026 && m===5 && d>=5) || (y===2026 && m>5) || y>2026) return 2;
    return 0; // antes de junho
  }

  // Fluoxetina: 60mg até 31/05, 20mg em 01–04/06, para após 04/06
  function fluoxPhase(){
    const now=new Date();
    const y=now.getFullYear(), m=now.getMonth(), d=now.getDate();
    if(y===2026 && m===5 && d>=1 && d<=4) return 'reducao'; // 20mg
    if((y===2026 && m===5 && d>=5) || (y===2026 && m>5) || y>2026) return 'parou';
    return 'normal'; // 60mg
  }

  function loadDaily(){
    try{const r=JSON.parse(localStorage.getItem(DAILY_KEY)||'{}');
      if(r.date!==todayKey())return{date:todayKey(),fluox:false,riva:false,minox:false,endofer:false,desven:false};
      return r;
    }catch{return{date:todayKey(),fluox:false,riva:false,minox:false,endofer:false,desven:false};}
  }
  function saveDaily(s){localStorage.setItem(DAILY_KEY,JSON.stringify(s));}

  let dailyState=loadDaily();

  // Set date label
  const now=new Date();
  document.getElementById('daily-date').textContent=
    `${WEEKDAYS[now.getDay()]}, ${now.getDate()} de ${MONTHS[now.getMonth()]}`;

  // Ajusta card diário conforme fase
  (function applyDailyPhases(){
    const fp=fluoxPhase(), dp=desvenPhase();
    const fluoxRow=document.getElementById('daily-fluox');
    const fluoxDose=document.getElementById('daily-fluox-dose');
    const fluoxWhen=document.getElementById('daily-fluox-when');
    const desvenRow=document.getElementById('daily-desven');
    const desvenDose=document.getElementById('daily-desven-dose');
    const desvenWhen=document.getElementById('daily-desven-when');

    if(fp==='reducao'){fluoxDose.textContent='20 mg';fluoxWhen.textContent='Após o café · fase de transição';}
    else if(fp==='parou'){fluoxRow.style.display='none';}

    if(dp===1){desvenRow.style.display='';desvenDose.textContent='25 mg';desvenWhen.textContent='Após o café · ½ comprimido';}
    else if(dp===2){desvenRow.style.display='';desvenDose.textContent='50 mg';desvenWhen.textContent='Após o café da manhã';}
  })();

  function dailyRenderState(){
    const ids=['fluox','riva','minox','endofer','desven'];
    ids.forEach(id=>{
      const row=document.getElementById(`daily-${id}`);
      const check=document.getElementById(`daily-check-${id}`);
      if(!row||row.style.display==='none')return;
      if(dailyState[id]){row.classList.add('taken');check.textContent='✓';}
      else{row.classList.remove('taken');check.textContent='';}
    });
    const fp=fluoxPhase(), dp=desvenPhase();
    const needFluox=fp!=='parou';
    const needDesven=dp>0;
    const allDone=(!needFluox||dailyState.fluox)&&(!needDesven||dailyState.desven)&&dailyState.riva&&dailyState.minox&&dailyState.endofer;
    document.getElementById('daily-alldone').classList.toggle('visible',allDone);
  }

  window.dailyToggle=function(id){
    dailyState[id]=!dailyState[id];
    saveDaily(dailyState);
    dailyRenderState();
  };
  window.dailyReset=function(){
    dailyState={date:todayKey(),fluox:false,riva:false,minox:false,endofer:false,desven:false};
    saveDaily(dailyState);
    dailyRenderState();
  };

  dailyRenderState();

  // Mini calendários Desvenlafaxina
  (function buildDesvenCalendars(){
    const DESVEN_KEY='desven_days_v1';
    function loadDesven(){try{return JSON.parse(localStorage.getItem(DESVEN_KEY)||'{}')}catch{return{};}}
    function saveDesven(s){try{localStorage.setItem(DESVEN_KEY,JSON.stringify(s));}catch{}}
    let desvenDays=loadDesven();

    const today=new Date();today.setHours(0,0,0,0);
    function dateKey(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
    const WD=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];

    function makeCell(date, label){
      const key=dateKey(date);
      const d=new Date(date);d.setHours(0,0,0,0);
      const isPast=d<today;
      const isToday=d.getTime()===today.getTime();
      if(isPast&&!desvenDays[key])desvenDays[key]=true;
      const done=desvenDays[key];
      const cell=document.createElement('div');
      cell.style.cssText=`flex:1;min-width:48px;border-radius:10px;padding:8px 4px;text-align:center;cursor:${isPast?'default':'pointer'};
        background:${done?'#f4a96a':'#f5f0ea'};border:${isToday?'2px solid #f4a96a':'1px solid #e8ddd0'};transition:all .2s;`;
      cell.innerHTML=`<div style="font-size:.6rem;color:${done?'#fff':'#a08060'};letter-spacing:.05em">${WD[date.getDay()]}</div>
        <div style="font-size:.88rem;font-weight:600;color:${done?'#fff':'#5a4a3a'};margin:2px 0">${String(date.getDate()).padStart(2,'0')}</div>
        <div style="font-size:.7rem;color:${done?'#fff':'#c9a87c'}">${done?'✓':label}</div>`;
      if(!isPast){
        cell.onclick=function(){
          desvenDays[key]=!desvenDays[key];
          saveDesven(desvenDays);
          buildDesvenCalendars();
        };
      }
      return cell;
    }

    // Fase 1: 01–04/06
    const g1=document.getElementById('desven-fase1-grid');
    if(g1){g1.innerHTML='';
      for(let i=0;i<4;i++){const d=new Date(2026,5,1+i);g1.appendChild(makeCell(d,'25mg'));}
    }
    // Fase 2: 05/06/2026 até 31/12/2026 (mesmo horizonte da manutenção da Lamotrigina)
    const g2=document.getElementById('desven-fase2-grid');
    if(g2){g2.innerHTML='';
      const fase2Start=new Date(2026,5,5);
      const fase2End=new Date(2026,11,31);
      const totalDias=Math.round((fase2End-fase2Start)/86400000)+1;
      for(let i=0;i<totalDias;i++){const d=new Date(2026,5,5+i);g2.appendChild(makeCell(d,'50mg'));}
    }
    saveDesven(desvenDays);
  })();
})();

/* ===== CONTROLE MENSAL — LAMOTRIGINA (aba Medicação) ===== */
(function medLamoControl(){
  const KEY='med_lamo_control_v1';
  const MONTH_NAMES=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  function load(){try{return JSON.parse(localStorage.getItem(KEY)||'{}');}catch{return{};}}
  function save(s){try{localStorage.setItem(KEY,JSON.stringify(s));}catch{}}

  function monthKey(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;}
  function monthLabel(key){
    const [y,m]=key.split('-').map(Number);
    return `${MONTH_NAMES[m-1]} / ${y}`;
  }

  const doseEl=document.getElementById('med-lamo-dose');
  const notesEl=document.getElementById('med-lamo-notes');
  const labelEl=document.getElementById('med-lamo-month-label');
  if(!doseEl||!notesEl)return;

  const currentKey=monthKey(new Date());
  if(labelEl)labelEl.textContent='· '+monthLabel(currentKey);

  const state=load();
  const cur=state[currentKey]||{dose:'',notes:''};
  doseEl.value=cur.dose||'';
  notesEl.value=cur.notes||'';

  let saveTimer=null;
  function persist(){
    clearTimeout(saveTimer);
    saveTimer=setTimeout(()=>{
      const s=load();
      s[currentKey]={dose:doseEl.value,notes:notesEl.value};
      save(s);
      renderHistory();
    },300);
  }
  doseEl.addEventListener('input',persist);
  notesEl.addEventListener('input',persist);

  function renderHistory(){
    const table=document.getElementById('med-lamo-hist-table');
    const tbody=document.getElementById('med-lamo-hist-tbody');
    const empty=document.getElementById('med-lamo-hist-empty');
    if(!table||!tbody||!empty)return;
    const s=load();
    const rows=Object.keys(s)
      .filter(k=>(s[k].dose||'').trim()||(s[k].notes||'').trim())
      .sort((a,b)=>b.localeCompare(a))
      .map(k=>({key:k,...s[k]}));
    if(rows.length===0){table.style.display='none';empty.style.display='block';return;}
    empty.style.display='none';table.style.display='table';
    tbody.innerHTML='';
    rows.forEach((r,i)=>{
      const tr=document.createElement('tr');
      tr.style.cssText=`border-bottom:1px solid #ddd8d0;${i%2===0?'background:white;':'background:#f8f5f0;'}`;
      tr.innerHTML=`
        <td style="padding:.55rem .5rem;font-weight:600;color:#2c2c2c;white-space:nowrap;">${monthLabel(r.key)}</td>
        <td style="padding:.55rem .5rem;color:#7a5ca8;font-weight:600;">${(r.dose||'—')}</td>
        <td style="padding:.55rem .5rem;color:#5a4a3a;">${(r.notes||'—')}</td>`;
      tbody.appendChild(tr);
    });
  }
  renderHistory();
})();

const MED_TODAY = new Date(2026,4,14);
const MED_WEEKDAYS=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
function medDateKey(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function medFormatDate(d){return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}`;}
function medIsToday(d){return medDateKey(d)===medDateKey(MED_TODAY);}
function medIsPast(d){return d<MED_TODAY && !medIsToday(d);}

function medLoadState(){try{return JSON.parse(localStorage.getItem('med_control_v2')||'{}');}catch{return{};}}
function medSaveState(s){localStorage.setItem('med_control_v2',JSON.stringify(s));}
let medState=medLoadState();

function medBuildPhase(phase,idx){
  const days=[];let cur=new Date(phase.start);
  while(cur<=phase.end){days.push(new Date(cur));cur.setDate(cur.getDate()+1);}
  const totalDays=days.length;
  const checkedDays=days.filter(d=>medState[medDateKey(d)]).length;
  const isActive=days.some(d=>medIsToday(d));
  const isOpen=isActive||idx===0;
  const div=document.createElement('div');
  div.className=`med-phase${isActive?' active':''}${isOpen?' open':''}`;
  div.dataset.phaseId=phase.id;
  const circumference=2*Math.PI*17;
  const offset=circumference-(checkedDays/totalDays)*circumference;
  const allDone=checkedDays===totalDays;
  const pillsHtml=phase.meds.map(m=>`<span class="med-pill ${m.key}" title="${m.dose}">${m.name} · ${m.dose}</span>`).join('');
  const startWd=phase.start.getDay();
  let gridHtml='<div class="med-days-grid-inner">';
  for(let i=0;i<startWd;i++)gridHtml+='<div></div>';
  days.forEach(d=>{
    const key=medDateKey(d);
    const checked=!!medState[key];
    const todayCls=medIsToday(d)?' today':'';
    const pastCls=medIsPast(d)?' past':'';
    const checkedCls=checked?' checked':'';
    const dots=phase.meds.map(m=>`<div class="med-dose-dot" style="background:${m.color}"></div>`).join('');
    gridHtml+=`<div class="med-day-cell${todayCls}${pastCls}${checkedCls}" data-date="${key}" onclick="medToggleDay('${key}')">
      <div class="med-day-weekday">${MED_WEEKDAYS[d.getDay()]}</div>
      <div class="med-day-num">${d.getDate()}/${d.getMonth()+1}</div>
      ${checked?'<div class="med-day-check">✓</div>':`<div class="med-dose-dots">${dots}</div>`}
    </div>`;
  });
  gridHtml+='</div>';
  div.innerHTML=`
    <div class="med-phase-header" onclick="medTogglePhase('${phase.id}')">
      <div class="med-phase-header-left">
        <div class="med-phase-tag">${phase.tag} · ${medFormatDate(phase.start)} – ${medFormatDate(phase.end)}</div>
        <div class="med-phase-title">${phase.title}</div>
      </div>
      <div class="med-phase-progress">
        <div class="med-progress-circle">
          <svg viewBox="0 0 44 44"><circle class="bg" cx="22" cy="22" r="17"/><circle class="fill${allDone?' done':''}" cx="22" cy="22" r="17" stroke-dasharray="${circumference}" stroke-dashoffset="${offset}"/></svg>
          <div class="med-progress-text">${checkedDays}/${totalDays}</div>
        </div>
      </div>
      <div class="med-toggle-arrow">▼</div>
    </div>
    <div class="med-meds-summary">${pillsHtml}</div>
    <div class="med-days-grid">${gridHtml}</div>
    <div class="med-phase-note">${phase.note}</div>`;
  return div;
}
function medTogglePhase(id){const el=document.querySelector(`[data-phase-id="${id}"]`);if(el)el.classList.toggle('open');}
function esquemaToggle(id){
  const body=document.getElementById(id+'-body');
  const arrow=document.getElementById(id+'-arrow');
  if(!body)return;
  const isOpen=body.style.display!=='none';
  body.style.display=isOpen?'none':'';
  if(arrow)arrow.classList.toggle('open',!isOpen);
}
function medToggleDay(dateStr){medState[dateStr]=!medState[dateStr];medSaveState(medState);medRender();}
function medRender(){
  const c=document.getElementById('med-phases-container');c.innerHTML='';
  MED_PHASES.forEach((p,i)=>c.appendChild(medBuildPhase(p,i)));
  medUpdateStats();
}
function medUpdateStats(){
  let allDays=[];
  MED_PHASES.forEach(phase=>{let cur=new Date(phase.start);while(cur<=phase.end){allDays.push(new Date(cur));cur.setDate(cur.getDate()+1);}});
  const total=Object.values(medState).filter(Boolean).length;
  let streak=0,check=new Date(MED_TODAY);
  while(medState[medDateKey(check)]){streak++;check.setDate(check.getDate()-1);}
  const remaining=allDays.filter(d=>!medState[medDateKey(d)]&&(medIsToday(d)||!medIsPast(d))).length;
  document.getElementById('med-stat-total').textContent=total;
  document.getElementById('med-stat-streak').textContent=streak;
  document.getElementById('med-stat-remaining').textContent=remaining;
}
medRender();

let dorSaveTimer=null;

function dorShowStatus(msg,color){

const DOR_LOCAL_KEY='painel_dores_local_v1';

// Chave dinâmica por mês: painel_dores_2026-06
function dorMonthKey(year, month){return`painel_dores_${year}-${String(month+1).padStart(2,'0')}`;}
function dorCurrentKey(){const n=new Date();return dorMonthKey(n.getFullYear(),n.getMonth());}
function dorMonthLabel(year,month){
  const names=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  return`${names[month]} / ${year}`;
}

let dorViewYear=new Date().getFullYear();
let dorViewMonth=new Date().getMonth();

function dorSaveLocal(data){
  try{
    const key=dorMonthKey(dorViewYear,dorViewMonth);
    localStorage.setItem(key,JSON.stringify(data));
    dorShowStatus('✓ Salvo','#4caf8a');
  }catch{dorShowStatus('⚠ Erro ao salvar','#f4a96a');}
}
function dorLoadLocal(){
  try{
    const key=dorMonthKey(dorViewYear,dorViewMonth);
    const s=localStorage.getItem(key);
    if(s)return JSON.parse(s);
    return null;
  }catch{return null;}
}

function dorPushData(data){
  dorSaveLocal(data);
}

function dorCollectData(){
  const rows=document.querySelectorAll('#dor-table-body tr');
  const data={
    month:document.getElementById('dor-month-title').value,
    meds:Array.from(document.querySelectorAll('.dor-med-check')).map(c=>c.checked),
    medOther:Array.from(document.querySelectorAll('.dor-med-item input[type="text"]')).map(i=>i.value),
    obs:Array.from(document.querySelectorAll('.dor-notes-area')).map(t=>t.value),
    days:{}
  };
  rows.forEach(row=>{
    const d=row.dataset.day;
    const intBtn=row.querySelector('.dor-int-btn[data-active="1"]');
    const sels=row.querySelectorAll('select');
    const inp=row.querySelector('input[type="text"]');
    const ta=row.querySelector('textarea');
    const rd={
      int:intBtn?parseInt(intBtn.dataset.val):0,
      loc:(sels[0]&&sels[0].value)||'',
      sym:(sels[1]&&sels[1].value)||'',
      resc:(inp&&inp.value)||'',
      notes:(ta&&ta.value)||''
    };
    if(rd.int||rd.loc||rd.sym||rd.resc||rd.notes)data.days[d]=rd;
  });
  return data;
}

function dorSaveAll(){
  clearTimeout(dorSaveTimer);
  dorSaveTimer=setTimeout(()=>{
    const data=dorCollectData();
    dorPushData(data);
    dorRenderMedHistory();
  },300);
}

function dorApplyData(saved){
  if(!saved)return;
  const tbody=document.getElementById('dor-table-body');
  tbody.querySelectorAll('tr').forEach(row=>{
    const d=row.dataset.day;
    const sd=saved.days&&saved.days[d]?saved.days[d]:{};
    if(sd.int){
      const wrap=row.querySelector('.dor-int-wrap');
      const btns=wrap.querySelectorAll('.dor-int-btn');
      btns.forEach(b=>{b.className='dor-int-btn';delete b.dataset.active;});
      const target=wrap.querySelector(`[data-val="${sd.int}"]`);
      if(target){target.className=`dor-int-btn active-${sd.int}`;target.dataset.active='1';}
    }
    const sels=row.querySelectorAll('select');
    if(sd.loc&&sels[0])sels[0].value=sd.loc;
    if(sd.sym&&sels[1])sels[1].value=sd.sym;
    const inp=row.querySelector('input[type="text"]');
    if(sd.resc&&inp)inp.value=sd.resc;
    const ta=row.querySelector('textarea');
    if(sd.notes&&ta)ta.value=sd.notes;
  });
  if(saved.month){
    document.getElementById('dor-month-title').value=saved.month;
    document.getElementById('dor-footer-month').textContent=saved.month;
  }
  if(saved.meds){
    const checks=document.querySelectorAll('.dor-med-check');
    saved.meds.forEach((v,i)=>{if(checks[i])checks[i].checked=v;});
  }
  if(saved.medOther){
    const others=document.querySelectorAll('.dor-med-item input[type="text"]');
    saved.medOther.forEach((v,i)=>{if(others[i])others[i].value=v;});
  }
  if(saved.obs){
    const areas=document.querySelectorAll('.dor-notes-area');
    saved.obs.forEach((v,i)=>{if(areas[i])areas[i].value=v;});
  }
  dorUpdateSummary();
}

const DOR_MED_FIXED_LABELS=['Rivaroxabana','Topiramato','Lamotrigina','Fluoxetina'];

// Monta o histórico de medicações mês a mês a partir de todas as chaves
// "painel_dores_AAAA-MM" salvas no localStorage
function dorRenderMedHistory(){
  const table=document.getElementById('dor-med-hist-table');
  const tbody=document.getElementById('dor-med-hist-tbody');
  const empty=document.getElementById('dor-med-hist-empty');
  if(!table||!tbody||!empty)return;

  const rows=[];
  for(let i=0;i<localStorage.length;i++){
    const key=localStorage.key(i);
    if(!key||!/^painel_dores_\d{4}-\d{2}$/.test(key))continue;
    let data;
    try{data=JSON.parse(localStorage.getItem(key));}catch{continue;}
    if(!data)continue;
    const meds=data.meds||[];
    const medOther=data.medOther||[];
    const activeLabels=[];
    meds.forEach((checked,i)=>{
      if(!checked)return;
      if(i<DOR_MED_FIXED_LABELS.length)activeLabels.push(DOR_MED_FIXED_LABELS[i]);
      else{
        const custom=(medOther[i-DOR_MED_FIXED_LABELS.length]||'').trim();
        activeLabels.push(custom||'Outro');
      }
    });
    if(activeLabels.length===0)continue; // mês sem nenhuma medicação registrada
    const [y,m]=key.replace('painel_dores_','').split('-').map(Number);
    rows.push({
      sortKey:key,
      month:data.month||dorMonthLabel(y,m-1),

const HO_RATE=8;        // valor por hora trabalhada
const HO_LIMIT=10;      // limite de horas pagas por dia
const HO_STORAGE_KEY='home_office_horas_v1';
const HO_MONTHS_PT=['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
const HO_MONTHS_SHORT_PT=['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];

function hoTodayStr(){const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function hoParseISO(iso){const[y,m,d]=iso.split('-').map(Number);return new Date(y,m-1,d);}
function hoToISO(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function hoCap(s){return s.charAt(0).toUpperCase()+s.slice(1);}
function hoFormatHours(dec){
  dec=Math.max(0,dec||0);
  const h=Math.floor(dec+1e-9);
  const m=Math.round((dec-h)*60);
  return m===0?`${h}h`:`${h}h${String(m).padStart(2,'0')}`;
}
function hoFormatMoney(v){return'$'+(v||0).toFixed(2).replace('.',',');}
function hoPaidHours(dec){return Math.min(dec||0,HO_LIMIT);}
function hoPaidValue(dec){return hoPaidHours(dec)*HO_RATE;}

/* ---- Cotação do dólar (USD → BRL) ---- */
const HO_RATE_STORAGE_KEY='home_office_dolar_v1'; // mapa {data:cotação}
function hoLoadRates(){
  try{const raw=localStorage.getItem(HO_RATE_STORAGE_KEY);const map=raw?JSON.parse(raw):{};return typeof map==='object'&&map?map:{};}catch{return{};}
}
function hoSaveRates(map){try{localStorage.setItem(HO_RATE_STORAGE_KEY,JSON.stringify(map));}catch{}}
// Cotação mais recente disponível no mapa, independente da data (usada como fallback)
function hoLatestRateEntry(map){
  const keys=Object.keys(map).sort();
  if(keys.length===0)return null;
  const k=keys[keys.length-1];
  return{date:k,rate:map[k]};
}
// Cotação a usar para uma data específica: a cotação salva naquele dia,
// ou — se não houver — a cotação mais recente conhecida até aquela data,
// ou — em último caso — a cotação mais recente disponível em todo o histórico.
function hoRateForDate(dateISO){
  const map=hoLoadRates();
  if(map[dateISO]!=null)return map[dateISO];
  const past=Object.keys(map).filter(k=>k<dateISO).sort();
  if(past.length>0)return map[past[past.length-1]];
  const latest=hoLatestRateEntry(map);
  return latest?latest.rate:null;
}
function hoFormatBRL(v){return'R$ '+(v||0).toFixed(2).replace('.',',');}

function hoRenderRateCard(){
  const map=hoLoadRates();
  const today=hoTodayStr();
  const display=document.getElementById('ho-rate-display');
  const updated=document.getElementById('ho-rate-updated');
  if(map[today]!=null){
    display.textContent='R$ '+Number(map[today]).toFixed(2).replace('.',',');
    updated.textContent='Atualizada hoje';
  }else{
    const latest=hoLatestRateEntry(map);
    if(latest){
      display.textContent='R$ '+Number(latest.rate).toFixed(2).replace('.',',');
      const d=hoParseISO(latest.date);
      updated.textContent=`Última cotação salva: ${String(d.getDate()).padStart(2,'0')} de ${HO_MONTHS_PT[d.getMonth()]}`;
    }else{
      display.textContent='—';
      updated.textContent='Nenhuma cotação salva ainda';
    }
  }
}
// Busca a cotação do dólar (USD→BRL) numa API pública e gratuita (AwesomeAPI).
// silent=true: tentativa automática ao abrir a aba (não mostra aviso se falhar).
async function hoFetchRate(manual){
  const btn=document.getElementById('ho-rate-refresh-btn');
  const hint=document.getElementById('ho-rate-hint');
  if(btn&&manual){btn.disabled=true;btn.textContent='Buscando...';}
  try{
    const resp=await fetch('https://economia.awesomeapi.com.br/last/USD-BRL');
    if(!resp.ok)throw new Error('resposta não-ok');
    const data=await resp.json();
    const bid=parseFloat(data&&data.USDBRL&&data.USDBRL.bid);
    if(isNaN(bid))throw new Error('valor inválido');
    const map=hoLoadRates();
    map[hoTodayStr()]=bid;
    hoSaveRates(map);
    hoRenderRateCard();
    hoRenderAll();
    if(manual&&hint){
      hint.textContent=`Cotação atualizada: R$ ${bid.toFixed(2).replace('.',',')}`;
      hint.className='ho-rate-hint visible ok';
    }
  }catch(e){
    if(manual&&hint){
      hint.textContent='Não foi possível buscar a cotação automaticamente agora (sem internet ou serviço indisponível). Você pode informar o valor manualmente abaixo.';
      hint.className='ho-rate-hint visible';
    }
  }finally{
    if(btn&&manual){btn.disabled=false;btn.textContent='🔄 Atualizar';}
  }
}
function hoSetManualRate(){
  const input=document.getElementById('ho-rate-input');
  const hint=document.getElementById('ho-rate-hint');
  const v=parseFloat((input.value||'').replace(',','.'));
  if(isNaN(v)||v<=0){
    hint.textContent='Informe um valor de cotação válido (ex: 5,35).';
    hint.className='ho-rate-hint visible';
    return;
  }
  const map=hoLoadRates();
  map[hoTodayStr()]=v;
  hoSaveRates(map);
  input.value='';
  hint.textContent=`Cotação de hoje salva manualmente: R$ ${v.toFixed(2).replace('.',',')}`;
  hint.className='ho-rate-hint visible ok';
  hoRenderRateCard();
  hoRenderAll();
}

function hoLegacyCycleEnd(cycleStart){return new Date(cycleStart.getFullYear(),cycleStart.getMonth()+1,14);}

// Retorna a entrada da tabela de ciclos (ou objeto equivalente) a que uma data pertence.
// Cobre: regime antigo (<15/06/2026) · tabela oficial (15/06/2026–25/09/2027) · além da tabela (estimado).
function hoCycleEntry(d){
  const iso=hoToISO(d);
  if(iso<'2026-06-15'){
    const cStart=hoLegacyCycleStart(d);
    const cEnd=hoLegacyCycleEnd(cStart);
    const base=`15 ${HO_MONTHS_SHORT_PT[cStart.getMonth()]} – 14 ${HO_MONTHS_SHORT_PT[cEnd.getMonth()]}`;
    return{start:hoToISO(cStart),end:hoToISO(cEnd),label:`${base}/${cEnd.getFullYear()} (regime antigo)`,pay:null,legacy:true};
  }
  for(const entry of HO_CYCLES_TABLE){
    if(iso>=entry.start&&iso<=entry.end)return entry;
  }
  // Além do último ciclo confirmado pela Lighthouse: sem data oficial ainda.
  // Agrupa por mês civil como fallback e sinaliza que precisa ser atualizado quando a Lighthouse divulgar novas datas.
  const y=d.getFullYear(),m=d.getMonth();
  const mStart=new Date(y,m,1),mEnd=new Date(y,m+1,0);
  return{start:hoToISO(mStart),end:hoToISO(mEnd),label:`${hoCap(HO_MONTHS_PT[m])} ${y} (datas ainda não divulgadas pela Lighthouse — verificar)`,pay:null,estimated:true};
}
function hoCycleStart(d){return hoParseISO(hoCycleEntry(d).start);}
function hoCycleEnd(cycleStart){return hoParseISO(hoCycleEntry(cycleStart).end);}
function hoCycleKey(cycleStart){return hoCycleEntry(cycleStart).start;}
function hoCycleLabel(cycleStart){
  const entry=hoCycleEntry(cycleStart);
  return entry.pay?`${entry.label} · pagto ~${entry.pay.slice(8,10)}/${entry.pay.slice(5,7)}`:entry.label;
}
function hoSumRange(map,startISO,endISO,bonusMap){
  let hours=0,value=0,valueBRL=0,days=0,hasRate=false,bonusValue=0,bonusValueBRL=0;
  Object.keys(map).forEach(date=>{
    if(date>=startISO&&date<=endISO){
      const h=map[date];
      const usd=hoPaidValue(h);
      hours+=h;value+=usd;days++;
      const rate=hoRateForDate(date);
      if(rate){valueBRL+=usd*rate;hasRate=true;}
    }
  });
  if(bonusMap){
    Object.keys(bonusMap).forEach(date=>{
      if(date>=startISO&&date<=endISO){
        const b=bonusMap[date]||0;
        bonusValue+=b;
        const rate=hoRateForDate(date);
        if(rate){bonusValueBRL+=b*rate;hasRate=true;}
      }
    });
  }
  return{hours,value,valueBRL,days,hasRate,bonusValue,bonusValueBRL,totalValue:value+bonusValue,totalValueBRL:valueBRL+bonusValueBRL};
}

function hoRenderSummary(){

  const mStart=new Date(now.getFullYear(),now.getMonth(),1);

  document.getElementById('ho-month-value').textContent=hoFormatMoney(mRange.totalValue)+(mRange.bonusValue>0?` (+ bônus ${hoFormatMoney(mRange.bonusValue)})`:'');

function hoSaveEntry(){
  const dateInput=document.getElementById('ho-input-date');
  let date=dateInput.value;
  if(!date){date=hoTodayStr();dateInput.value=date;}
  const hint=document.getElementById('ho-form-hint');
  const hVal=parseFloat(document.getElementById('ho-input-h').value);
  const mVal=parseFloat(document.getElementById('ho-input-m').value)||0;
  if(isNaN(hVal)||hVal<0){
    hint.textContent='Informe um número de horas válido.';
    hint.className='ho-form-hint visible';
    return;
  }
  const decimal=hVal+mVal/60;
  if(decimal<=0){
    hint.textContent='Informe ao menos alguns minutos trabalhados.';
    hint.className='ho-form-hint visible';
    return;
  }
  if(decimal>24){
    hint.textContent='Um dia tem no máximo 24 horas :)';
    hint.className='ho-form-hint visible';
    return;
  }
  const map=hoLoad();
  map[date]=decimal;
  hoSave(map);
  if(decimal>HO_LIMIT){
    hint.textContent=`Registrado ${hoFormatHours(decimal)}. Apenas ${HO_LIMIT}h são pagas por dia (limite diário) — valor: ${hoFormatMoney(hoPaidValue(decimal))}.`;
    hint.className='ho-form-hint visible';
  }else{
    hint.textContent=`Salvo! ${hoFormatHours(decimal)} → ${hoFormatMoney(hoPaidValue(decimal))}`;
    hint.className='ho-form-hint visible ok';
  }
  hoRenderAll();
}

function bkDaysAgo(dateStr){ if(!dateStr)return null; return Math.floor((Date.now()-new Date(dateStr).getTime())/86400000); }
function bkGetStatus(intervalDays,dateStr){
  const d=bkDaysAgo(dateStr);
  if(d===null)return"pending";
  if(d>=intervalDays)return"due";
  if(d>=intervalDays-3)return"soon";
  return"ok";
}
const bkStatusStyle={
  pending:{ label:"Nunca aplicado", color:"#999" },
  due:    { label:"Hora de aplicar!", color:"#c0392b" },
  soon:   { label:"Em breve",        color:"#c07800" },
  ok:     { label:"Em dia ✓",        color:"#2e8b57" },
};

// Calcula plantas que faltam adubar NESTE MÊS
// "Falta" = nunca aplicado OU vence dentro do mês corrente (intervalDays calculado por mês)
function bkCountPendingThisMonth(bkDates, exDates, plants){
  plants = plants || bkPlants;
  const now=new Date();
  const daysInMonth=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();
  const dayOfMonth=now.getDate();
  const daysLeft=daysInMonth-dayOfMonth;

  let count=0;
  plants.forEach(p=>{
    if(p.group==='skip')return;
    const st=bkGetStatus(p.intervalDays,bkDates[p.id]);
    if(st==='due'||st==='pending'||st==='soon')count++;
    (p.extras||[]).forEach(ex=>{
      const key=`${p.id}_${ex.type}`;
      const exSt=bkGetStatus(ex.interval,exDates[key]);
      if(exSt==='due'||exSt==='pending'||exSt==='soon')count++;
    });
  });
  return count;
}

// Plantas adicionadas pela usuária (persistidas localmente)
const CUSTOM_PLANTS_KEY='bokashi_custom_plants_v1';
function bkLoadCustomPlants(){
  try{ const r=JSON.parse(localStorage.getItem(CUSTOM_PLANTS_KEY)||'[]'); return Array.isArray(r)?r:[]; }catch{ return []; }
}
function bkSaveCustomPlants(arr){ try{ localStorage.setItem(CUSTOM_PLANTS_KEY,JSON.stringify(arr)); }catch{} }

const bkNewPlantGroupOptions=[
  { value:"monthly",  label:"🌵 Mensal (a cada 4 semanas)",     intervalDays:28, defaultDose:"½ col. chá" },
  { value:"biweekly", label:"🌿 Quinzenal (a cada 2 semanas)",   intervalDays:14, defaultDose:"1 col. chá" },
  { value:"boost",    label:"🌱 Quinzenal — dose reforçada",     intervalDays:14, defaultDose:"1½ col. chá" },
  { value:"skip",     label:"🚫 Aguardando (sem adubação ainda)",intervalDays:null, defaultDose:"" },
];

function BokashiApp(){
  const [bkDates,setBkDates] = React.useState(()=>bkLoad(BK_KEY));
  const [exDates,setExDates] = React.useState(()=>{
    const ex=bkLoad(EX_KEY);
    // Orquídeas marcadas na primeira abertura se não tiverem data
    let changed=false;
    if(!ex['2_orquidea']){ex['2_orquidea']=new Date().toISOString();changed=true;}
    if(!ex['3_orquidea']){ex['3_orquidea']=new Date().toISOString();changed=true;}
    if(changed)bkSave(EX_KEY,ex);
    return ex;
  });
  const [filter,setFilter]  = React.useState("all");
  const [search,setSearch]  = React.useState("");

  const [flashEx,setFlashEx]= React.useState({});

  const allPlants = React.useMemo(()=>[...bkPlants, ...customPlants], [customPlants]);

  function addCustomPlant(){
    const name=newPlant.name.trim();
    if(!name)return;
    const cfg=bkNewPlantGroupOptions.find(o=>o.value===newPlant.group)||bkNewPlantGroupOptions[0];
    const plant={
      id:`custom_${Date.now()}`,
      name,
      group:cfg.value,
      note:newPlant.note.trim()||undefined,
      custom:true,
    };
    if(cfg.value!=='skip'){
      plant.dose = newPlant.dose.trim() || cfg.defaultDose;
      plant.intervalDays = cfg.intervalDays;
    }
    const updated=[...customPlants, plant];
    setCustomPlants(updated); bkSaveCustomPlants(updated);
    setNewPlant({name:"",group:"monthly",dose:"",note:""});
    setShowAddForm(false);
  }
  function removeCustomPlant(id){
    const updated=customPlants.filter(p=>p.id!==id);
    setCustomPlants(updated); bkSaveCustomPlants(updated);
    // limpa datas associadas
    const bk={...bkDates}; if(bk[id]){delete bk[id]; setBkDates(bk); bkSave(BK_KEY,bk);}
    const ex={...exDates}; let exChanged=false;
    Object.keys(ex).forEach(k=>{ if(k.startsWith(`${id}_`)){delete ex[k]; exChanged=true;} });
    if(exChanged){ setExDates(ex); bkSave(EX_KEY,ex); }
  }

  // Verifica virada de mês — arquiva se mudou
  React.useEffect(()=>{
    const savedMonth=localStorage.getItem('bokashi_current_month');
    const thisMonth=bkMonthKey();
    if(savedMonth && savedMonth!==thisMonth){
      // Arquiva mês anterior
      const hist=bkLoad(BK_HIST);
      const pending=bkCountPendingThisMonth(bkLoad(BK_KEY),bkLoad(EX_KEY),allPlants);
      hist[savedMonth]={ applied: Object.keys(bkLoad(BK_KEY)).length, pending };
      bkSave(BK_HIST,hist);
    }
    localStorage.setItem('bokashi_current_month',thisMonth);
  },[]);

  function bkFlash(setter,key){ setter(p=>({...p,[key]:true})); setTimeout(()=>setter(p=>{const n={...p};delete n[key];return n;}),1800); }

  function applyBokashi(id){
    const u={...bkDates,[id]:new Date().toISOString()};
    setBkDates(u);bkSave(BK_KEY,u);bkFlash(setFlashBk,id);
  }
  function resetBokashi(id){
    const u={...bkDates};delete u[id];setBkDates(u);bkSave(BK_KEY,u);
  }
  function applyExtra(id,type){
    const key=`${id}_${type}`;
    const u={...exDates,[key]:new Date().toISOString()};
    setExDates(u);bkSave(EX_KEY,u);bkFlash(setFlashEx,key);
  }
  function resetExtra(id,type){
    const key=`${id}_${type}`;
    const u={...exDates};delete u[key];setExDates(u);bkSave(EX_KEY,u);
  }

  const plantIsDue=p=>{
    const bk=p.group!=='skip'?bkGetStatus(p.intervalDays,bkDates[p.id]):null;
    if(bk==='due'||bk==='pending')return true;
    return(p.extras||[]).some(e=>{ const s=bkGetStatus(e.interval,exDates[`${p.id}_${e.type}`]); return s==='due'||s==='pending'; });
  };

  // Conta todas as plantas que têm algo para adubar (bokashi OU extras)
  let countOk=0, countPending=0;
  allPlants.forEach(p=>{
    const hasExtras=(p.extras||[]).length>0;
    const hasBokashi=p.group!=='skip';

    let allOk=true;

      const bkSt=bkGetStatus(p.intervalDays,bkDates[p.id]);
      if(bkSt!=='ok'&&bkSt!=='soon')allOk=false;
    }
    if(hasExtras){
      const extrasOk=(p.extras||[]).every(ex=>{
        const s=bkGetStatus(ex.interval,exDates[`${p.id}_${ex.type}`]);
        return s==='ok'||s==='soon';
      });
      if(!extrasOk)allOk=false;
    }
    if(allOk)countOk++; else countPending++;
  });
  const pendingCount=countPending;
  const doneThisMonth=countOk;

  const visible=allPlants.filter(p=>{
    if(!p.name.toLowerCase().includes(search.toLowerCase()))return false;

        ),
        e('div',{style:{background:"rgba(255,255,255,.12)",borderRadius:12,padding:"8px 16px",textAlign:"center",minWidth:80}},

    e('div',{style:{display:"flex",gap:8,padding:"12px 16px 0",overflowX:"auto"}},

                  bkDates[plant.id]&&e('button',{onClick:()=>resetBokashi(plant.id),style:{background:"transparent",color:"#ccc",border:"1px solid #e5e0d8",borderRadius:8,padding:"3px 8px",cursor:"pointer",fontSize:10,fontFamily:"inherit"}},"Resetar")
                )
              ),

              // Extras
              ...(plant.extras||[]).map((ex,i)=>{
                const ecfg=bkExtraColors[ex.type];
                const exKey=`${plant.id}_${ex.type}`;
                const exSt=bkGetStatus(ex.interval,exDates[exKey]);
                const exStStyle=bkStatusStyle[exSt];
                const exDa=bkDaysAgo(exDates[exKey]);
                const isLast=i===(plant.extras.length-1);
                return e('div',{key:ex.type,style:{margin:`0 12px ${isLast?10:6}px`,background:ecfg.bg,borderRadius:10,padding:"10px 12px",display:"flex",justifyContent:"space-between",alignItems:"flex-start"}},
                  e('div',{style:{flex:1}},
                    e('div',{style:{fontSize:12,fontWeight:"bold",color:ecfg.color}},`${ecfg.icon} ${ex.label} · ${ex.dose}`),
                    e('div',{style:{fontSize:11,color:"#999",fontStyle:"italic",marginTop:2}},ex.note),
                    e('div',{style:{display:"flex",alignItems:"center",gap:5,marginTop:5}},
                      e('span',{style:{fontSize:11,fontWeight:"bold",color:exStStyle.color,background:exStStyle.color+"18",padding:"2px 9px",borderRadius:20}},exStStyle.label),
                      exDa!==null&&e('span',{style:{fontSize:11,color:"#bbb"}},`há ${exDa} dia${exDa!==1?"s":""}`)
                    )
                  ),
                  e('div',{style:{display:"flex",flexDirection:"column",gap:5,marginLeft:10}},
                    e('button',{onClick:()=>applyExtra(plant.id,ex.type),style:{background:flashEx[exKey]?"#5a9e6f":ecfg.color,color:"#fff",border:"none",borderRadius:8,padding:"7px 13px",cursor:"pointer",fontSize:12,fontFamily:"inherit",fontWeight:"bold",minWidth:82}},flashEx[exKey]?"✓ Feito!":"Aplicar"),
                    exDates[exKey]&&e('button',{onClick:()=>resetExtra(plant.id,ex.type),style:{background:"transparent",color:"#ccc",border:"1px solid #e5e0d8",borderRadius:8,padding:"3px 8px",cursor:"pointer",fontSize:10,fontFamily:"inherit"}},"Resetar")
                  )
                );
              }),

              plant.group==='skip'&&!(plant.extras?.length)&&e('div',{style:{padding:"0 16px 12px",fontSize:12,color:"#aaa",fontStyle:"italic"}},plant.note),

              plant.custom&&e('div',{style:{padding:"0 16px 12px",textAlign:"right"}},
                e('button',{onClick:()=>removeCustomPlant(plant.id),style:{background:"transparent",color:"#c0392b",border:"1px solid #f0d8d4",borderRadius:8,padding:"4px 10px",cursor:"pointer",fontSize:11,fontFamily:"inherit"}},"🗑 Remover planta")
              )
            );
          })
        )
      );
    }).filter(Boolean),

    visible.length===0&&e('div',{style:{textAlign:"center",color:"#aaa",marginTop:60,fontSize:15}},"Nenhuma planta encontrada."),
    e('div',{style:{textAlign:"center",color:"#ccc",fontSize:11,marginTop:40,paddingBottom:20}},"Dados salvos localmente no seu dispositivo 🌱")
  );
}

window.renderBokashi=function(){
  if(window._bokashiRendered)return;
  window._bokashiRendered=true;
  const root=ReactDOM.createRoot(document.getElementById('bokashi-root'));
  root.render(React.createElement(BokashiApp));
};

})();
</script>

<script>
/* ===== HISTÓRICO DE DORES ===== */
const HIST_KEY = 'painel_dores_historico_v1';

function histLoad(){
  try{return JSON.parse(localStorage.getItem(HIST_KEY)||'[]');}catch{return[];}
}
function histSave(arr){
  try{localStorage.setItem(HIST_KEY,JSON.stringify(arr));}catch{}
}

// Calcula resumo a partir de um objeto de dados de dores
function histCalcSummary(data){
  if(!data||!data.days)return null;
  let daysWithPain=0,totalInt=0,rescueCount=0,worstDay=0,worstInt=0;
  Object.entries(data.days).forEach(([day,rd])=>{
    if(!rd||typeof rd!=='object')return; // ignora registros de dia em formato inesperado
    if(rd.int>0){
      daysWithPain++;totalInt+=rd.int;
      if(rd.int>worstInt){worstInt=rd.int;worstDay=parseInt(day);}
    }
    if(rd.resc&&rd.resc.trim())rescueCount++;
  });
  return{
    month:data.month||'',
    daysWithPain,
    rescueCount,
    avgInt:daysWithPain>0?(totalInt/daysWithPain).toFixed(1):'—',
    worstDay:worstDay>0?`Dia ${String(worstDay).padStart(2,'0')}`:'—',
    worstInt:worstInt>0?worstInt:'—'
  };
}

// Salva mês atual no histórico se tiver dados
function histArchiveCurrentMonth(){
  const data=dorLoadLocal();
  if(!data||!data.days||Object.keys(data.days).length===0)return;
  const summary=histCalcSummary(data);
  if(!summary||summary.daysWithPain===0)return;
  const hist=histLoad();
  // Não duplicar o mesmo mês
  const key=data.month||'sem título';
  const exists=hist.findIndex(h=>h.month===key);
  if(exists>=0)hist[exists]=summary;
  else hist.unshift(summary);
  histSave(hist);
}

function histRender(){
  const hist=histLoad();
  // Também inclui mês atual se tiver dados
  const data=dorLoadLocal();
  let rows=hist.slice();
  if(data&&data.days&&Object.keys(data.days).length>0){
    const cur=histCalcSummary(data);
    if(cur&&cur.daysWithPain>0){
      const exists=rows.findIndex(h=>h.month===cur.month);
      if(exists>=0)rows[exists]=cur;
      else rows.unshift(cur);
    }
  }

  const table=document.getElementById('hist-table');
  const tbody=document.getElementById('hist-tbody');
  const empty=document.getElementById('hist-empty');
  const note=document.getElementById('hist-note');

  if(rows.length===0){
    table.style.display='none';empty.style.display='block';note.style.display='none';
    return;
  }
  empty.style.display='none';table.style.display='table';note.style.display='block';
  tbody.innerHTML='';
  rows.forEach((r,i)=>{
    const tr=document.createElement('tr');
    tr.style.cssText=`border-bottom:1px solid #ddd8d0;${i%2===0?'background:white;':'background:#f8f5f0;'}`;
    const intColor=r.worstInt>=8?'#c0392b':r.worstInt>=5?'#e67e22':r.worstInt>=3?'#f1c40f':'#27ae60';
    tr.innerHTML=`
      <td style="padding:.6rem .6rem;font-weight:600;color:#2c2c2c;">${r.month||'—'}</td>
      <td style="padding:.6rem .6rem;text-align:center;color:#1a3a5c;font-weight:600;">${r.daysWithPain}</td>
      <td style="padding:.6rem .6rem;text-align:center;color:#c9a87c;font-weight:600;">${r.rescueCount}</td>
      <td style="padding:.6rem .6rem;text-align:center;color:#5a4a3a;">${r.avgInt}</td>
      <td style="padding:.6rem .6rem;text-align:center;color:#5a4a3a;">${r.worstDay}</td>
      <td style="padding:.6rem .6rem;text-align:center;font-weight:700;color:${intColor};">${r.worstInt}</td>`;
    tbody.appendChild(tr);
  });
}
</script>
</template>
<script>
let __authMode = 'login';
document.getElementById('__tabLogin').onclick = ()=>{
  __authMode='login';
  document.getElementById('__tabLogin').style.background='#1F4038';document.getElementById('__tabLogin').style.color='#fff';
  document.getElementById('__tabSignup').style.background='#EAEDE9';document.getElementById('__tabSignup').style.color='#6B7A73';
  document.getElementById('__authSubmit').textContent='Entrar';
  document.getElementById('__authError').style.display='none';
};
document.getElementById('__tabSignup').onclick = ()=>{
  __authMode='signup';
  document.getElementById('__tabSignup').style.background='#1F4038';document.getElementById('__tabSignup').style.color='#fff';
  document.getElementById('__tabLogin').style.background='#EAEDE9';document.getElementById('__tabLogin').style.color='#6B7A73';
  document.getElementById('__authSubmit').textContent='Criar conta';
  document.getElementById('__authError').style.display='none';
};
function __authErrorMsg(code){
  const map = {
    'auth/invalid-email':'E-mail inválido.',
    'auth/user-not-found':'Não existe conta com esse e-mail.',
    'auth/wrong-password':'Senha incorreta.',
    'auth/invalid-credential':'E-mail ou senha incorretos.',
    'auth/email-already-in-use':'Já existe uma conta com esse e-mail. Toque em "Entrar".',
    'auth/weak-password':'A senha precisa ter pelo menos 6 caracteres.',
    'auth/network-request-failed':'Sem conexão com a internet.'
  };
  return map[code] || ('Não foi possível continuar (código: ' + (code||'desconhecido') + ').');
}
document.getElementById('__authSubmit').onclick = async ()=>{
  const email = document.getElementById('__authEmail').value.trim();
  const pass = document.getElementById('__authPass').value;
  const errEl = document.getElementById('__authError');
  errEl.style.display='none';
  if(!email || !pass){ errEl.textContent='Preencha e-mail e senha.'; errEl.style.display='block'; return; }
  try{
    if(__authMode==='signup') await __auth.createUserWithEmailAndPassword(email, pass);
    else await __auth.signInWithEmailAndPassword(email, pass);
  }catch(e){
    errEl.textContent = __authErrorMsg(e.code);
    errEl.style.display='block';
  }
};
document.getElementById('__logoutBtn').onclick = ()=>{ __auth.signOut(); location.reload(); };

let __booted = false;
__auth.onAuthStateChanged(async user=>{
  if(user){
    __currentUser = user;
    await __hydrateFromCloud();
    document.getElementById('__authOverlay').style.display='none';
    document.getElementById('__logoutBtn').style.display='block';
    if(!__booted){ __booted = true; __bootApp(); }
  } else {
    __currentUser = null;
    document.getElementById('__authOverlay').style.display='flex';
    document.getElementById('__logoutBtn').style.display='none';
  }
});
</script>
